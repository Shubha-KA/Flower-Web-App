apiVersion: apps/v1
kind: Deployment
metadata: 
  name: flower-deploy
  namespace: flower-ns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: flower-app
  template:
    metadata:
      labels:
        app: flower-app
    spec: 
      containers: 
        - name: flower-cont
          image: shubha20/flower-web-app:v2.1.0
          ports:
            - containerPort: 3015
          resources:
            requests:
              memory: "128Gi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: flower-svc
  namespace: flower-ns
spec:
  selector:
    app: flower-app
  ports:
    - port: 80
      targetPort: 3015
      protocol: TCP
  type: NodePort